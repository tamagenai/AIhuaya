<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Noto+Serif+SC:wght@300;600&display=swap" rel="stylesheet">
  <style>
    body { background-color: #f5f2ed; color: #1a1a1a; font-family: sans-serif; }
    .chinese-text { font-family: 'Noto Serif SC', serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwg_UlQR6x4ebkLLSVef-x2DcY7_pfzuMZhTH5FV-yCdCiFeZTFwRptiWlEfWdLZ4ro/exec";

    const { useState, useRef, useEffect } = React;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    function App() {
      const [sheets, setSheets] = useState([]);
      const[currentSheet, setCurrentSheet] = useState("");
      const [conversation, setConversation] = useState([]);
      const[activeLine, setActiveLine] = useState(null);
      const [isRecording, setIsRecording] = useState(false);
      const [isPlaying, setIsPlaying] = useState(null);
      const[evalResults, setEvalResults] = useState({});
      const [isLoading, setIsLoading] = useState(true);
      const[loadingEval, setLoadingEval] = useState(null);
      const recognition = useRef(null);

      useEffect(() => {
        const init = async () => {
          try {
            const sheetNames = await fetchFromGAS({ action: "getSheets" });
            setSheets(sheetNames);
            if (sheetNames.length > 0) loadLesson(sheetNames[0]);
            else setIsLoading(false);
          } catch (e) {
            alert("スプレッドシートの読み込みに失敗: " + e.message);
            setIsLoading(false);
          }
        };
        init();

        if (SpeechRecognition) {
          recognition.current = new SpeechRecognition();
          recognition.current.lang = 'zh-CN';
          recognition.current.interimResults = false;
          recognition.current.onend = () => setIsRecording(false);
          recognition.current.onerror = (e) => {
            alert("マイクエラー: " + e.error + "\n(※iPhoneの場合、https通信でないとマイクは動きません)");
            setIsRecording(false);
          };
        }
      },[]);

      const loadLesson = async (sheetName) => {
        setIsLoading(true);
        setCurrentSheet(sheetName);
        setEvalResults({});
        try {
          const data = await fetchFromGAS({ action: "getLesson", sheetName: sheetName });
          setConversation(data);
        } catch (e) {
          alert("課の読み込みに失敗: " + e.message);
        } finally {
          setIsLoading(false);
        }
      };

      const fetchFromGAS = async (payload) => {
        const response = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (result.status !== "success") throw new Error(result.message);
        return result.data;
      };

      // ★Web Speech API (ブラウザ標準機能) で音声を読み上げる処理に変更
      const playAudio = (line) => {
        if (isPlaying) return;
        
        // ブラウザが音声合成に対応しているかチェック
        if (!window.speechSynthesis) {
          alert("お使いのブラウザは音声読み上げに対応していません。");
          return;
        }

        // もし現在別の音声が流れていたらストップさせる
        window.speechSynthesis.cancel();
        
        setIsPlaying(line.id);

        // 読み上げる文章をセット
        const utterance = new SpeechSynthesisUtterance(line.chinese);
        utterance.lang = 'zh-CN'; // 中国語（簡体字）に設定
        utterance.rate = 0.9;     // 少しゆっくり発音させる（1.0が標準。お好みで調整してください）
        
        utterance.onend = () => setIsPlaying(null);
        utterance.onerror = (e) => {
          console.error("音声読み上げエラー:", e);
          setIsPlaying(null);
        };

        // 読み上げ開始
        window.speechSynthesis.speak(utterance);
      };

      const toggleMic = (line) => {
        if (isRecording) {
          recognition.current.stop();
          return;
        }
        if (!recognition.current) {
          alert("お使いのブラウザは音声認識に対応していません。");
          return;
        }
        setActiveLine(line.id);
        setIsRecording(true);

        recognition.current.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          evaluate(line, transcript);
        };
        recognition.current.start();
      };

      const evaluate = async (line, transcript) => {
        setLoadingEval(line.id);
        try {
          // 発音の評価だけはGemini AI（GAS）を使ってスコアを出してもらう
          const res = await fetchFromGAS({ action: "evaluatePronunciation", targetText: line.chinese, userTranscript: transcript });
          setEvalResults(prev => ({ ...prev,[line.id]: { ...res, transcript } }));
        } catch(err) {
          alert("評価エラー:\n" + err.message);
        } finally {
          setLoadingEval(null);
        }
      };

      return (
        <div className="p-4 md:p-10 max-w-2xl mx-auto">
          <h1 className="text-4xl font-serif mb-6 text-center pb-2">華雅 <span className="italic text-yellow-600">Kaga</span></h1>
          
          <div className="mb-8 text-center border-b pb-6">
            <select 
              value={currentSheet} 
              onChange={(e) => loadLesson(e.target.value)}
              className="px-4 py-2 border border-gray-300 rounded-lg text-lg bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-yellow-500"
              disabled={isLoading}
            >
              {sheets.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>

          {isLoading ? (
            <div className="text-center text-gray-500 text-lg mt-10 animate-pulse">読み込み中...</div>
          ) : (
            <div className="space-y-8">
              {conversation.map(line => (
                <div key={line.id} className={`border-l-4 pl-4 py-4 bg-white shadow-sm rounded-r-lg transition-all ${activeLine === line.id ? 'border-yellow-500 ring-1 ring-yellow-200' : 'border-gray-200'}`}>
                  <p className="text-[10px] text-yellow-700 font-bold uppercase tracking-widest mb-1">{line.speaker}</p>
                  <div onClick={() => playAudio(line)} className="cursor-pointer hover:bg-gray-50 p-2 rounded transition">
                    <p className="text-3xl chinese-text mb-1 flex items-center gap-2">
                      {line.chinese}
                      {isPlaying === line.id && <span className="text-xs animate-pulse text-yellow-500">Playing...</span>}
                    </p>
                    <p className="text-sm text-gray-400 mb-2 font-mono">{line.pinyin}</p>
                    <p className="text-sm italic text-gray-600 border-t pt-2">{line.japanese}</p>
                  </div>
                  
                  <div className="mt-4 flex items-center gap-4">
                    <button 
                      onClick={() => toggleMic(line)}
                      className={`text-[10px] px-6 py-2 rounded-full font-bold transition-all ${isRecording && activeLine === line.id ? 'bg-red-500 text-white animate-pulse' : 'bg-black text-white hover:bg-gray-800'}`}
                    >
                      {isRecording && activeLine === line.id ? 'STOPPING...' : '🎤 PRACTICE'}
                    </button>
                    {loadingEval === line.id && <span className="text-sm text-gray-400 animate-spin">⌛ 評価中...</span>}
                  </div>

                  {evalResults[line.id] && (
                    <div className="mt-4 p-4 bg-gray-50 rounded border-t border-gray-100">
                      <div className="flex flex-col gap-1 mb-3 border-b border-gray-200 pb-2">
                        <span className="font-bold text-yellow-600 text-lg">AIスコア: {evalResults[line.id].score} 点</span>
                        <span className="text-gray-500 text-lg">あなたの発音: "{evalResults[line.id].transcript}"</span>
                      </div>
                      <p className="text-gray-800 text-lg leading-relaxed">{evalResults[line.id].feedback}</p>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
