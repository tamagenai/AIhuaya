<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Noto+Serif+SC:wght@300;600&display=swap" rel="stylesheet">
  <style>
    body { background-color: #f5f2ed; color: #1a1a1a; font-family: sans-serif; }
    .chinese-text { font-family: 'Noto Serif SC', serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ★★★ここにSTEP 2で取得したGASのURLを貼り付けてください★★★
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzjkzOhpae-QPAI7JITgZoJtD2hp_kW8RfmOL0rmIoEJCOx73N5gG677QYu7Ow1E3Ob/exec";

    const { useState, useRef, useEffect } = React;

    const CONVERSATION =[
      { id: "1", speaker: "山本", chinese: "李华，好久不见。", pinyin: "Lǐ Huá, hǎojiǔ bújiàn.", japanese: "李華、久しぶり。" },
      { id: "2", speaker: "李华", chinese: "好久不见。你最近怎么样？", pinyin: "Hǎojiǔ bújiàn. Nǐ zuìjìn zěnmeyàng?", japanese: "久しぶり。最近どう？" },
      { id: "3", speaker: "山本", chinese: "我下个月有汉语考试，非常忙。", pinyin: "Wǒ xià ge yuè yǒu Hànyǔ kǎoshì, fēicháng máng.", japanese: "来月中国語の試験があって、とても忙しいんだ。" }
    ];

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    function App() {
      const [activeLine, setActiveLine] = useState(null);
      const [isRecording, setIsRecording] = useState(false);
      const [isPlaying, setIsPlaying] = useState(null);
      const[evalResults, setEvalResults] = useState({});
      const [loadingEval, setLoadingEval] = useState(null);
      const recognition = useRef(null);

      useEffect(() => {
        if (SpeechRecognition) {
          recognition.current = new SpeechRecognition();
          recognition.current.lang = 'zh-CN';
          recognition.current.interimResults = false;
          recognition.current.onend = () => setIsRecording(false);
          recognition.current.onerror = (e) => {
            alert("マイクエラー: " + e.error);
            setIsRecording(false);
          };
        }
      },[]);

      // GASと通信する関数 (google.script.run の代わり)
      const fetchFromGAS = async (payload) => {
        const response = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" }, // エラー回避のためtext/plain指定
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (result.status !== "success") throw new Error(result.message);
        return result.data;
      };

      const playAudio = async (line) => {
        if (isPlaying) return;
        setIsPlaying(line.id);
        
        try {
          const base64 = await fetchFromGAS({ action: "generateSpeech", text: line.chinese });
          const audio = new Audio("data:audio/wav;base64," + base64);
          audio.onended = () => setIsPlaying(null);
          audio.play();
        } catch(err) {
          console.error(err);
          setIsPlaying(null);
          const uttr = new SpeechSynthesisUtterance(line.chinese);
          uttr.lang = 'zh-CN';
          uttr.onend = () => setIsPlaying(null);
          window.speechSynthesis.speak(uttr);
        }
      };

      const toggleMic = (line) => {
        if (isRecording) {
          recognition.current.stop();
          return;
        }
        if (!recognition.current) {
          alert("このブラウザは音声認識に対応していません。Chromeをお使いください。");
          return;
        }
        setActiveLine(line.id);
        setIsRecording(true);

        recognition.current.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          evaluate(line, transcript);
        };
        recognition.current.start();
      };

      const evaluate = async (line, transcript) => {
        setLoadingEval(line.id);
        try {
          const res = await fetchFromGAS({ 
            action: "evaluatePronunciation", 
            targetText: line.chinese, 
            userTranscript: transcript 
          });
          setEvalResults(prev => ({ ...prev,[line.id]: { ...res, transcript } }));
        } catch(err) {
          alert("評価エラー:\n" + err.message);
        } finally {
          setLoadingEval(null);
        }
      };

      return (
        <div className="p-4 md:p-10 max-w-2xl mx-auto">
          <h1 className="text-4xl font-serif mb-10 text-center border-b pb-5">華雅 <span className="italic text-yellow-600">Kaga</span></h1>
          <div className="space-y-8">
            {CONVERSATION.map(line => (
              <div key={line.id} className={`border-l-4 pl-4 py-4 bg-white shadow-sm rounded-r-lg transition-all ${activeLine === line.id ? 'border-yellow-500 ring-1 ring-yellow-200' : 'border-gray-200'}`}>
                <p className="text-[10px] text-yellow-700 font-bold uppercase tracking-widest mb-1">{line.speaker}</p>
                <div onClick={() => playAudio(line)} className="cursor-pointer hover:bg-gray-50 p-2 rounded transition">
                  <p className="text-3xl chinese-text mb-1 flex items-center gap-2">
                    {line.chinese}
                    {isPlaying === line.id && <span className="text-xs animate-pulse text-yellow-500">Playing...</span>}
                  </p>
                  <p className="text-sm text-gray-400 mb-2 font-mono">{line.pinyin}</p>
                  <p className="text-sm italic text-gray-600 border-t pt-2">{line.japanese}</p>
                </div>
                
                <div className="mt-4 flex items-center gap-4">
                  <button 
                    onClick={() => toggleMic(line)}
                    className={`text-[10px] px-6 py-2 rounded-full font-bold transition-all ${isRecording && activeLine === line.id ? 'bg-red-500 text-white animate-pulse' : 'bg-black text-white hover:bg-gray-800'}`}
                  >
                    {isRecording && activeLine === line.id ? 'STOPPING...' : '🎤 PRACTICE'}
                  </button>
                  {loadingEval === line.id && <span className="text-[10px] text-gray-400 animate-spin">⌛ Evaluating...</span>}
                </div>

                {evalResults[line.id] && (
                  <div className="mt-4 p-3 bg-gray-50 rounded text-sm border-t border-gray-100">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="font-bold text-yellow-600">Score: {evalResults[line.id].score}</span>
                      <span className="text-gray-400 text-xs">"{evalResults[line.id].transcript}"</span>
                    </div>
                    <p className="text-gray-600 text-xs">{evalResults[line.id].feedback}</p>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
