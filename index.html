<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>じわじわ</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/pinyin-pro"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    body { background-color: #f5f2ed; color: #1a1a1a; font-family: sans-serif; }
    .chinese-text { font-family: 'Noto Serif SC', serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwg_UlQR6x4ebkLLSVef-x2DcY7_pfzuMZhTH5FV-yCdCiFeZTFwRptiWlEfWdLZ4ro/exec";

    const PALETTES =[
      { chinese: "text-green-800", speaker: "text-green-600", border: "border-green-400" },
      { chinese: "text-blue-800", speaker: "text-blue-600", border: "border-blue-400" },
      { chinese: "text-teal-900", speaker: "text-teal-700", border: "border-teal-500" },
      { chinese: "text-amber-800", speaker: "text-amber-600", border: "border-amber-500" },
      { chinese: "text-purple-800", speaker: "text-purple-600", border: "border-purple-400" }
    ];

    // ★追加：2つの配列（ピンインの配列）を比較し、類似度を0〜100点で計算するアルゴリズム（レーベンシュタイン距離）
    const calculateSimilarity = (arr1, arr2) => {
      if (arr1.length === 0 && arr2.length === 0) return 100;
      if (arr1.length === 0 || arr2.length === 0) return 0;

      const matrix = Array(arr2.length + 1).fill(null).map(() => Array(arr1.length + 1).fill(null));

      for (let i = 0; i <= arr1.length; i++) matrix[0][i] = i;
      for (let j = 0; j <= arr2.length; j++) matrix[j][0] = j;

      for (let j = 1; j <= arr2.length; j++) {
        for (let i = 1; i <= arr1.length; i++) {
          const indicator = arr1[i - 1] === arr2[j - 1] ? 0 : 1;
          matrix[j][i] = Math.min(
            matrix[j][i - 1] + 1, // 挿入
            matrix[j - 1][i] + 1, // 削除
            matrix[j - 1][i - 1] + indicator // 置換
          );
        }
      }
      const distance = matrix[arr2.length][arr1.length];
      const maxLength = Math.max(arr1.length, arr2.length);
      const similarity = ((maxLength - distance) / maxLength) * 100;
      return Math.round(similarity);
    };

    const { useState, useRef, useEffect } = React;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    function App() {
      const [sheets, setSheets] = useState([]);
      const[currentSheet, setCurrentSheet] = useState("");
      const [conversation, setConversation] = useState([]);
      const[videoUrl, setVideoUrl] = useState("");
      const [activeLine, setActiveLine] = useState(null);
      const [isRecording, setIsRecording] = useState(false);
      const [isPlaying, setIsPlaying] = useState(null);
      const [evalResults, setEvalResults] = useState({});
      const[isLoading, setIsLoading] = useState(true);
      const [loadingEval, setLoadingEval] = useState(null);
      
      const [speakerColors, setSpeakerColors] = useState({});
      
      const recognition = useRef(null);

      useEffect(() => {
        const init = async () => {
          try {
            const sheetNames = await fetchFromGAS({ action: "getSheets" });
            setSheets(sheetNames);
            if (sheetNames.length > 0) loadLesson(sheetNames[0]);
            else setIsLoading(false);
          } catch (e) {
            alert("スプレッドシートの読み込みに失敗: " + e.message);
            setIsLoading(false);
          }
        };
        init();

        if (SpeechRecognition) {
          recognition.current = new SpeechRecognition();
          recognition.current.lang = 'zh-CN';
          recognition.current.interimResults = false;
          recognition.current.onend = () => setIsRecording(false);
          recognition.current.onerror = (e) => {
            alert("マイクエラー: " + e.error + "\n(※iPhone/iPadの場合、設定からマイクを許可してください)");
            setIsRecording(false);
          };
        }
      },[]);

      const loadLesson = async (sheetName) => {
        setIsLoading(true);
        setCurrentSheet(sheetName);
        setEvalResults({});
        try {
          const data = await fetchFromGAS({ action: "getLesson", sheetName: sheetName });
          
          setConversation(data.conversation);
          setVideoUrl(data.videoUrl);
          
          const uniqueSpeakers =[...new Set(data.conversation.map(item => item.speaker).filter(Boolean))];
          const newSpeakerColors = {};
          uniqueSpeakers.forEach((speaker, index) => {
            newSpeakerColors[speaker] = PALETTES[index % PALETTES.length];
          });
          setSpeakerColors(newSpeakerColors);

        } catch (e) {
          alert("課の読み込みに失敗: " + e.message);
        } finally {
          setIsLoading(false);
        }
      };

      const fetchFromGAS = async (payload) => {
        const response = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (result.status !== "success") throw new Error(result.message);
        return result.data;
      };

      const playAudio = (line) => {
        if (isPlaying) return;
        if (!window.speechSynthesis) {
          alert("お使いのブラウザは音声読み上げに対応していません。");
          return;
        }
        window.speechSynthesis.cancel();
        setIsPlaying(line.id);
        const utterance = new SpeechSynthesisUtterance(line.chinese);
        utterance.lang = 'zh-CN'; 
        utterance.rate = 0.9;     
        utterance.onend = () => setIsPlaying(null);
        utterance.onerror = (e) => {
          console.error("音声読み上げエラー:", e);
          setIsPlaying(null);
        };
        window.speechSynthesis.speak(utterance);
      };

      const toggleMic = (line) => {
        if (isRecording) {
          recognition.current.stop();
          return;
        }
        if (!recognition.current) {
          alert("お使いのブラウザは音声認識に対応していません。");
          return;
        }
        setActiveLine(line.id);
        setIsRecording(true);

        recognition.current.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          evaluate(line, transcript);
        };
        recognition.current.start();
      };

      const evaluate = async (line, transcript) => {
        setLoadingEval(line.id);
        try {
          // ★変更：記号やスペースを完全に除去して純粋な文字だけにする
          const normalizeText = (text) => {
            if (!text) return "";
            return text.replace(/[\s　，。？！、：；“”‘’（）\(\)\[\]【】,\.\?!:;"']/g, '');
          };

          const targetClean = normalizeText(line.chinese);
          const userClean = normalizeText(transcript);

          // ユーザーの表示用ピンイン
          const userPinyinDisplay = pinyinPro.pinyin(transcript, { toneType: 'symbol' });

          let score = 0;
          let feedback = "";

          // 1. 簡体字が完全一致するかチェック
          if (targetClean === userClean) {
            score = 100;
            feedback = "完璧です！正しく発音されました。";
          } else {
            // 2. 一致しない場合、ピンインを配列化して比較
            // 例: "你好" -> ["nǐ", "hǎo"]
            const targetPinyinArr = pinyinPro.pinyin(targetClean, { type: 'array', toneType: 'symbol' });
            const userPinyinArr = pinyinPro.pinyin(userClean, { type: 'array', toneType: 'symbol' });

            // レーベンシュタイン距離アルゴリズムで類似度を計算
            score = calculateSimilarity(targetPinyinArr, userPinyinArr);

            // スコアに応じたフィードバック
            if (score === 100) {
              feedback = "完璧です！正しく発音されました。";
            } else if (score >= 80) {
              feedback = "とても良いです！あと少し！";
            } else if (score >= 50) {
              feedback = "惜しいです。ピンインを確認してもう一度！";
            } else {
              feedback = "もっと発音の練習をしましょう。";
            }
          }
          
          setTimeout(() => {
            setEvalResults(prev => ({ ...prev,[line.id]: { score, feedback, transcript, userPinyinDisplay } }));
            setLoadingEval(null);
          }, 600);

        } catch(err) {
          alert("評価エラー:\n" + err.message);
          setLoadingEval(null);
        }
      };

      // ★追加：練習記録をクリップボードにコピーする機能
      const copyToClipboard = () => {
        if (Object.keys(evalResults).length === 0) {
          alert("まだ練習記録がありません。");
          return;
        }

        let textToCopy = `【${currentSheet} 練習記録】\n\n`;
        
        conversation.forEach(line => {
          const result = evalResults[line.id];
          if (result) {
            textToCopy += `■ 目標: ${line.chinese}\n`;
            textToCopy += `  ピンイン: ${line.pinyin}\n`;
            textToCopy += `  日本語訳: ${line.japanese}\n`;
            textToCopy += `  あなたの発音: ${result.transcript}\n`;
            textToCopy += `  あなたのピンイン: ${result.userPinyinDisplay}\n`;
            textToCopy += `  スコア: ${result.score}点\n\n`;
          }
        });

        navigator.clipboard.writeText(textToCopy).then(() => {
          alert("練習記録をクリップボードにコピーしました！\n先生に提出（ペースト）してください。");
        }).catch(err => {
          alert("コピーに失敗しました: " + err);
        });
      };

      return (
        <div className="p-4 md:p-10 max-w-2xl mx-auto">
         <h1 className="text-4xl font-serif mb-6 text-center pb-2 font-bold">じわじわ身につく中国語<span className="italic text-yellow-600">会話篇</span></h1>
          
          <div className="mb-8 text-center border-b pb-6">
            <select 
              value={currentSheet} 
              onChange={(e) => loadLesson(e.target.value)}
              className="px-4 py-2 border border-gray-300 rounded-lg text-lg font-bold bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-yellow-500"
              disabled={isLoading}
            >
              {sheets.map(s => <option key={s} value={s}>{s}</option>)}
            </select>

            {/* ★追加：動画ボタンと練習記録コピーボタンを並べて表示 */}
            <div className="mt-4 flex flex-wrap justify-center gap-4">
              {videoUrl && (
                <a href={videoUrl} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 px-4 py-2 bg-red-600 text-white font-bold rounded-full hover:bg-red-700 transition shadow-sm text-sm">
                  ▶ 動画を見る
                </a>
              )}
              
              {/* 評価結果が1つ以上ある場合のみコピーボタンを表示 */}
              {Object.keys(evalResults).length > 0 && (
                <button 
                  onClick={copyToClipboard}
                  className="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white font-bold rounded-full hover:bg-blue-700 transition shadow-sm text-sm"
                >
                  📋 音声入力練習記録をコピー
                </button>
              )}
            </div>
          </div>

          {isLoading ? (
            <div className="text-center text-gray-500 text-lg mt-10 animate-pulse font-bold">読み込み中...</div>
          ) : (
            <div className="space-y-8">
              {conversation.map(line => {
                const palette = speakerColors[line.speaker] || { chinese: "text-gray-900", speaker: "text-gray-500", border: "border-gray-300" };
                
                return (
                <div key={line.id} className={`border-l-4 pl-4 py-4 bg-white shadow-sm rounded-r-lg transition-all ${activeLine === line.id ? 'border-yellow-500 ring-2 ring-yellow-200' : palette.border}`}>
                  
                  <p className={`text-xs font-bold uppercase tracking-widest mb-1 ${palette.speaker}`}>{line.speaker}</p>
                  
                  <div onClick={() => playAudio(line)} className="cursor-pointer hover:bg-gray-50 p-2 rounded transition">
                    
                    <p className={`text-4xl font-bold chinese-text mb-2 flex items-center gap-2 ${palette.chinese}`}>
                      {line.chinese}
                      {isPlaying === line.id && <span className="text-sm animate-pulse text-yellow-500 font-bold ml-2">Playing...</span>}
                    </p>
                    
                    <p className="text-base font-semibold text-gray-500 mb-2 font-mono">{line.pinyin}</p>
                    
                    <div className="border-t border-gray-200 pt-2 mt-2">
                      {line.grammar && (
                        <p className="text-sm font-bold text-blue-700 mb-1 flex items-start gap-2">
                          <span className="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded whitespace-nowrap mt-0.5">文法</span>
                          <span>{line.grammar}</span>
                        </p>
                      )}
                      <p className="text-base font-bold text-gray-700">{line.japanese}</p>
                    </div>

                  </div>
                  
                  <div className="mt-4 flex items-center gap-4">
                    <button 
                      onClick={() => toggleMic(line)}
                      className={`text-[11px] px-6 py-2 rounded-full font-bold transition-all shadow-sm ${isRecording && activeLine === line.id ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-800 text-white hover:bg-black'}`}
                    >
                      {isRecording && activeLine === line.id ? 'STOPPING...' : '🎤 PRACTICE'}
                    </button>
                    {loadingEval === line.id && <span className="text-sm font-bold text-gray-400 animate-spin">⌛ 評価中...</span>}
                  </div>

                  {evalResults[line.id] && (
                    <div className="mt-4 p-4 bg-gray-50 rounded border-t border-gray-200 shadow-inner">
                      <div className="flex flex-col gap-1 mb-3 border-b border-gray-300 pb-2">
                        <span className="font-bold text-yellow-600 text-xl">スコア: {evalResults[line.id].score} 点</span>
                        <span className="text-gray-600 font-bold text-lg">あなたの発音: "{evalResults[line.id].transcript}"</span>
                        <span className="text-gray-500 font-mono text-base">ピンイン: {evalResults[line.id].userPinyinDisplay}</span>
                      </div>
                      <p className="text-gray-800 text-lg font-medium leading-relaxed">{evalResults[line.id].feedback}</p>
                    </div>
                  )}
                </div>
              )})}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
